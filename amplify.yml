version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - corepack enable
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .nuxt/**/*
